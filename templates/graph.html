<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Graph RAG Explorer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        body { background-color: #f4f7f9; margin: 0; }
        #cy {
            width: 95%;
            height: 650px;
            margin: 20px auto;
            background-color: white;
            border: 1px solid #e2e8f0;
            border-radius: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .container { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 10px; }
        h2 { color: #1a237e; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        .controls { text-align: center; font-size: 13px; color: #64748b; margin-bottom: 5px; }
        .badge-info { background: #e0e7ff; color: #4338ca; padding: 4px 12px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2><i class="fas fa-project-diagram"></i> Knowledge Graph Visualizer</h2>
        <div class="controls">
            <span class="badge-info">Mode Interactif</span> • Molette pour zoomer • Cliquer-glisser pour déplacer
        </div>
        <div id="cy"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function(){
            var cy = cytoscape({
                container: document.getElementById('cy'),
                elements: {
                    nodes: [
                        {% for node in nodes %}
                        // Correction : Utilisation du filtre | tojson pour éviter les erreurs de syntaxe JS
                        { data: { id: {{ node.id | tojson }}, label: {{ node.id | tojson }} } }{% if not loop.last %},{% endif %}
                        {% endfor %}
                    ],
                    edges: [
                        {% for link in links %}
                        { data: { 
                            source: {{ link.source | tojson }}, 
                            target: {{ link.target | tojson }}, 
                            label: {{ link.label | tojson if link.label else "REL" | tojson }} 
                        } }{% if not loop.last %},{% endif %}
                        {% endfor %}
                    ]
                },
                style: [
                    {
                        selector: 'node',
                        style: {
                            'background-color': '#1a237e',
                            'label': 'data(label)',
                            'color': '#1e293b', // Texte sombre pour lisibilité hors du cercle
                            'text-valign': 'bottom',
                            'text-margin-y': 8,
                            'font-size': '12px',
                            'font-weight': 'bold',
                            'width': '40px',
                            'height': '40px',
                            'overlay-padding': '6px',
                            'z-index': '10'
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 3,
                            'line-color': '#94a3b8',
                            'target-arrow-color': '#94a3b8',
                            'target-arrow-shape': 'triangle',
                            'curve-style': 'bezier',
                            'label': 'data(label)',
                            'font-size': '10px',
                            'color': '#475569',
                            'text-rotation': 'autorotate',
                            'text-background-opacity': 1,
                            'text-background-color': '#ffffff',
                            'text-background-padding': '3px',
                            'text-background-shape': 'roundrectangle'
                        }
                    }
                ],
                layout: {
                    name: 'cose',
                    idealEdgeLength: 100,
                    nodeOverlap: 20,
                    refresh: 20,
                    fit: true,
                    padding: 30,
                    randomize: false,
                    componentSpacing: 100,
                    nodeRepulsion: 400000,
                    edgeElasticity: 100,
                    nestingFactor: 5,
                    gravity: 80,
                    numIter: 1000,
                    initialTemp: 200,
                    coolingFactor: 0.95,
                    minTemp: 1.0
                }
            });
        });
    </script>
</body>
</html>
